<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Movie Request Form</title>
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --error: #ff4b2b;
            --success: #00c851;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        body {
            margin: 0;
            padding: 20px;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
            text-align: center;
        }

        h2 {
            margin-bottom: 25px;
            font-size: 24px;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        label {
            font-size: 11px;
            color: #94a3b8;
            margin-bottom: 6px;
            display: block;
            padding-left: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s ease;
        }

        input:focus, textarea:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
        }

        .input-error {
            border-color: var(--error) !important;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0, 210, 255, 0.2);
            margin-top: 10px;
            letter-spacing: 1px;
        }

        .submit-btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }

        #toast {
            position: fixed;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 24px;
            border-radius: 50px;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            z-index: 9999;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
            white-space: nowrap;
            border: 1px solid rgba(255,255,255,0.1);
        }

        #toast.show {
            bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Movie Request</h2>
    <form id="movieForm">
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="User Name" id="userName" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Gmail</label>
            <input type="email" name="Email" id="userEmail" placeholder="example@gmail.com" required autocomplete="email">
        </div>

        <div class="form-group">
            <label>Movie Details</label>
            <textarea name="Movie Details" id="movieDetails" rows="2" placeholder="Movie name and year..." required></textarea>
        </div>

        <div class="form-group">
            <label>Social Media (Optional)</label>
            <input type="url" name="Social Link" id="socialLink" placeholder="Facebook/Telegram link...">
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">SEND REQUEST</button>
    </form>
</div>

<div id="toast"></div>

<script>
    const form = document.getElementById('movieForm');
    const emailInput = document.getElementById('userEmail');
    const submitBtn = document.getElementById('submitBtn');

    // স্মার্ট জিমেইল অটো-ফিক্স লজিক
    emailInput.addEventListener('blur', function() {
        let val = this.value.trim().toLowerCase();
        if (val === "") return;

        // ১. যদি @ না থাকে তবে পুরোটা ফিক্স করবে
        if (!val.includes('@')) {
            this.value = val + "@gmail.com";
        } 
        // ২. যদি @ থাকে কিন্তু পরের অংশ ভুল থাকে (যেমন: @gmal, @gmail.co)
        else {
            let parts = val.split('@');
            let domain = parts[1];
            
            // যদি জিমেইল এর বানান ভুল হয় বা ডোমেইন অসম্পূর্ণ থাকে
            if (domain !== "gmail.com") {
                this.value = parts[0] + "@gmail.com";
            }
        }
    });

    function showToast(msg, color) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = color;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const emailValue = emailInput.value.trim();

        if (!emailValue.toLowerCase().endsWith('@gmail.com')) {
            emailInput.classList.add('input-error');
            showToast("Correcting to @gmail.com", "#ff4b2b");
            setTimeout(() => emailInput.classList.remove('input-error'), 500);
            return;
        }

        submitBtn.disabled = true;
        submitBtn.innerText = "SENDING...";

        const formData = new FormData(form);
        formData.append("_subject", "New Movie Request!");

        const endPoints = [
            "https://formspree.io/f/xeevayrb", 
            "https://formspree.io/f/mlgajqoz"
        ];

        let success = false;

        for (let i = 0; i < endPoints.length; i++) {
            try {
                console.log(`Trying Server ${i + 1}...`);
                const response = await fetch(endPoints[i], {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (response.ok) {
                    success = true;
                    break;
                }
            } catch (err) {
                console.error(`Server Error:`, err.message);
            }
        }

        if (success) {
            showToast("Request Sent Successfully!", "#00c851");
            form.reset();
        } else {
            showToast("Server Error. Try again.", "#ff4b2b");
        }

        submitBtn.disabled = false;
        submitBtn.innerText = "SEND REQUEST";
    });
</script>

</body>
</html>
