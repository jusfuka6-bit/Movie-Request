<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Request</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #121212;
            color: #202124;
        }

        .container {
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #01579b;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
            color: #5f6368;
        }

        input[type="text"], textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background-color: #f1f3f4;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #01579b;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(1, 87, 155, 0.1);
        }

        .submit-btn {
            background-color: #01579b;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .submit-btn:active {
            transform: scale(0.96);
        }

        /* Toast CSS */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 10px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            left: 50%;
            bottom: 30px;
            transform: translateX(-50%);
            font-size: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        #toast.show {
            visibility: visible;
            -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @-webkit-keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @-webkit-keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div class="container">
    <h2>Movie Request</h2>
    
    <form id="movieForm">
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="User Name" id="userName" placeholder="আপনার নাম লিখুন" required>
        </div>

        <div class="form-group">
            <label>Movie Name</label>
            <input type="text" name="Movie Name" id="movieName" placeholder="মুভির নাম ও বছর লিখুন" required>
        </div>

        <div class="form-group">
            <label>Other information</label>
            <textarea name="Message" id="message" rows="4" placeholder="মুভিটি সম্পর্কে কিছু বলতে চাইলে লিখুন..."></textarea>
        </div>

        <button type="submit" id="submitBtn" class="submit-btn">Submit</button>
    </form>
</div>

<div id="toast"></div>

<script>
    const form = document.getElementById('movieForm');
    const submitBtn = document.getElementById('submitBtn');
    const toast = document.getElementById('toast');

    const primaryLink = "https://formspree.io/f/xeevayrb";
    const fallbackLink = "https://formspree.io/f/mlgajqoz";

    // Toast Function
    function showToast(message, bgColor = "#333") {
        toast.innerText = message;
        toast.style.backgroundColor = bgColor;
        toast.className = "show";
        setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
    }

    form.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.innerText = "Sending...";

        const formData = new FormData(form);
        formData.append("_subject", "নতুন মুভি রিকোয়েস্ট এসেছে!");

        try {
            const response = await fetch(primaryLink, {
                method: 'POST',
                body: formData,
                headers: { 'Accept': 'application/json' }
            });

            if (response.ok) {
                showToast("Request Successful", "#2e7d32"); // Green for success
                form.reset();
            } else {
                throw new Error('Primary failed');
            }
        } catch (error) {
            try {
                const secondResponse = await fetch(fallbackLink, {
                    method: 'POST',
                    body: formData,
                    headers: { 'Accept': 'application/json' }
                });

                if (secondResponse.ok) {
                    showToast("Request Successful", "#2e7d32");
                    form.reset();
                } else {
                    showToast("Server is full, try again later.", "#c62828"); // Red for error
                }
            } catch (err) {
                showToast("Check internet connection.", "#c62828");
            }
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = "Submit";
        }
    });
</script>

</body>
</html>
