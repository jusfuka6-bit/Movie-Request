<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Movie - Movie BD</title>
    <style>
        /* টেক্সট সিলেকশন বন্ধ */
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            color: #202124;
        }

        .container {
            max-width: 450px;
            margin: 40px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #01579b;
            font-size: 24px;
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 14px;
            color: #5f6368;
        }

        input[type="text"], 
        input[type="email"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            background-color: #f1f3f4;
            outline: none;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: #01579b;
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(1, 87, 155, 0.1);
        }

        .submit-btn {
            background-color: #01579b;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s, background-color 0.2s;
        }

        .submit-btn:active {
            transform: scale(0.96);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            text-decoration: none;
            color: #01579b;
            font-size: 14px;
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Movie Request</h2>
    
    <form action="https://formspree.io/f/xeevayrb" method="POST">
        
        <div class="form-group">
            <label>Your Name</label>
            <input type="text" name="User Name" placeholder="আপনার নাম লিখুন" required>
        </div>

        <div class="form-group">
            <label>Movie Name</label>
            <input type="text" name="Movie Name" placeholder="মুভির নাম ও বছর লিখুন" required>
        </div>

        <div class="form-group">
            <label>Other information</label>
            <textarea name="Message" rows="4" placeholder="মুভিটি সম্পর্কে কিছু বলতে চাইলে লিখুন..."></textarea>
        </div>

        <input type="hidden" name="_subject" value="নতুন মুভি রিকোয়েস্ট এসেছে!">

        <button type="submit" class="submit-btn">Submit</button>
    </form>
</div>

</body>
</html>
