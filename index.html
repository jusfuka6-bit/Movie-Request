<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Movie - Movie BD</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
            color: #202124;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            color: #01579b;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 500;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"], 
        input[type="file"],
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #01579b;
        }

        .submit-btn {
            background-color: #01579b;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .submit-btn:active {
            transform: scale(0.95);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #5f6368;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Movie Request</h2>
    
    <form action="https://formspree.io/f/xeevayrb" method="POST" enctype="multipart/form-data">
        
        <div class="form-group">
            <label>আপনার নাম (User Name)</label>
            <input type="text" name="name" placeholder="আপনার নাম লিখুন" required>
        </div>

        <div class="form-group">
            <label>মুভির নাম (Movie Name)</label>
            <input type="text" name="movie_name" placeholder="মুভির নাম ও বছর লিখুন" required>
        </div>

        <div class="form-group">
            <label>স্ক্রিনশট (Screenshot)</label>
            <input type="file" name="upload" accept="image/*">
            <small style="color: #888;">*যদি প্রয়োজন হয় মুভির পোস্টার দিন</small>
        </div>

        <div class="form-group">
            <label>অতিরিক্ত বার্তা (Message)</label>
            <textarea name="message" rows="3" placeholder="অন্য কিছু বলতে চাইলে এখানে লিখুন..."></textarea>
        </div>

        <button type="submit" class="submit-btn">রিকোয়েস্ট পাঠান</button>
    </form>

    <a href="index.html" class="back-link">← ব্যাগে যান</a>
</div>

</body>
</html>
